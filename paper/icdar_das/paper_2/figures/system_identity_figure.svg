<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430">
  <rect width="1280" height="430" fill="#fbfaf6"/>
  <text x="48" y="40" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2937">
    Support-Aware Interactive Verification System
  </text>
  <text x="48" y="66" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">
    paper_2 identity: support-aware, budget-aware profile selection for historical document verification
  </text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="46" y="110" rx="16" ry="16" width="150" height="92" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="121" y="144" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">Input Crop</text>
  <text x="121" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1e3a8a">Grouped historical</text>
  <text x="121" y="186" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1e3a8a">word image</text>

  <rect x="232" y="110" rx="16" ry="16" width="175" height="92" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="319" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#5b21b6">Posterior Layer</text>
  <text x="319" y="166" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5b21b6">Confusion network</text>
  <text x="319" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5b21b6">explicit uncertainty</text>

  <rect x="444" y="110" rx="16" ry="16" width="190" height="92" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="539" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#78350f">Support + Budget</text>
  <text x="539" y="162" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#78350f">entropy, set size,</text>
  <text x="539" y="180" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#78350f">support count, k, fragility</text>

  <rect x="672" y="96" rx="18" ry="18" width="210" height="64" fill="#fee2e2" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="777" y="123" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#7f1d1d">Profile Selector</text>
  <text x="777" y="144" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#7f1d1d">near-oracle rescue / shortlist routing</text>

  <rect x="672" y="176" rx="18" ry="18" width="210" height="64" fill="#dcfce7" stroke="#15803d" stroke-width="2.5"/>
  <text x="777" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#14532d">Budget Regime</text>
  <text x="777" y="224" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#14532d">review budget k = 2 / 3 / 5</text>

  <rect x="918" y="84" rx="18" ry="18" width="290" height="170" fill="#fff7ed" stroke="#c2410c" stroke-width="2.5"/>
  <text x="1063" y="114" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#7c2d12">Adaptive Control</text>
  <text x="1063" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#7c2d12">preserve</text>
  <text x="1063" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7c2d12">raw uncertainty, wider beam</text>
  <text x="1063" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#7c2d12">prune</text>
  <text x="1063" y="210" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7c2d12">conformal shortlist compaction</text>
  <text x="1063" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#7c2d12">defer</text>
  <text x="1063" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7c2d12">escalate fragile cases under tight budgets</text>

  <rect x="918" y="292" rx="16" ry="16" width="180" height="90" fill="#e0e7ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="1008" y="324" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">Shortlist Output</text>
  <text x="1008" y="348" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1e3a8a">ranked grouped candidates</text>
  <text x="1008" y="366" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1e3a8a">for verification</text>

  <rect x="1126" y="292" rx="16" ry="16" width="120" height="90" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="1186" y="324" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Archive</text>
  <text x="1186" y="346" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#0f172a">verify,</text>
  <text x="1186" y="364" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#0f172a">retrieve, act</text>

  <line x1="196" y1="156" x2="232" y2="156" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="407" y1="156" x2="444" y2="156" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="634" y1="156" x2="672" y2="128" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="634" y1="156" x2="672" y2="208" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="882" y1="128" x2="918" y2="128" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="882" y1="208" x2="918" y2="208" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1063" y1="254" x2="1063" y2="292" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1098" y1="337" x2="1126" y2="337" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="772" y="276" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#475569">
    tight budgets can trigger defer; wider budgets reduce regret and recover shortlist utility
  </text>
</svg>
