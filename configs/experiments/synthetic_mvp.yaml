experiment:
  name: synthetic_mvp
  seed: 7
  seed_sweep: []
  output_root: outputs/runs
  notes: "Synthetic uncertainty-aware vertical slice."

dataset:
  source: synthetic
  manifest_path: null
  manifest_format: glyph_crop
  generate_if_missing: true
  train_split: train
  val_split: val
  evaluation_split: test
  min_sequences_per_split_warning: 2
  min_symbol_instances_per_train_class_warning: 2
  min_family_instances_per_split_warning: 2

synthetic:
  families:
    - monoalphabetic
    - homophonic
    - transposition
    - pseudo_text
  samples_per_family: 8
  sequence_length: 48
  alphabet_size: 18
  homophonic_extra_symbols: 8
  transposition_block_size: 4
  noise_std: 0.2
  allograph_jitter: 1.25
  image_size: 24
  train_fraction: 0.5
  val_fraction: 0.25

vision:
  feature_downsample: 10
  estimate_clusters: true
  min_clusters: 4
  max_clusters: 32

posterior:
  strategy: calibrated_classifier
  top_k: 4
  temperature: 1.5
  floor_probability: 1.0e-6
  embedding_dim: 32
  use_label_supervision: true
  calibration_grid:
    - 0.5
    - 0.75
    - 1.0
    - 1.5
    - 2.0
    - 3.0

triage:
  repeat_ngram_sizes:
    - 2
    - 3
  shuffled_null_trials: 8

hypotheses:
  families:
    - unknown_script
    - monoalphabetic
    - homophonic
    - transposition_heuristic
    - pseudo_text_null

evaluation:
  enabled: true
  ambiguity_levels:
    - 0.0
    - 0.15
    - 0.3
    - 0.45
  top_k: 3
  comparison_strategies:
    - cluster_distance
    - calibrated_classifier
  overdiffuse_entropy_ratio: 0.8
  bootstrap_trials: 250
  bootstrap_confidence_level: 0.95
  bootstrap_seed: 101
