experiment:
  name: real_manifest_large_paper_pack
  seed: 23
  seed_sweep:
    - 29
    - 31
  output_root: outputs/runs
  notes: "Template for a larger real glyph-crop dataset run with the full paper pack."

dataset:
  source: manifest
  manifest_path: data/raw/your_large_real_crop_manifest/manifest.yaml
  manifest_format: glyph_crop
  generate_if_missing: false
  train_split: train
  val_split: val
  evaluation_split: test
  min_sequences_per_split_warning: 25
  min_symbol_instances_per_train_class_warning: 5
  min_family_instances_per_split_warning: 3

synthetic:
  families:
    - monoalphabetic
  samples_per_family: 6
  sequence_length: 32
  alphabet_size: 12
  homophonic_extra_symbols: 6
  transposition_block_size: 4
  noise_std: 0.2
  allograph_jitter: 0.7
  image_size: 24
  train_fraction: 0.5
  val_fraction: 0.25

vision:
  feature_downsample: 10
  estimate_clusters: true
  min_clusters: 4
  max_clusters: 64

posterior:
  strategy: calibrated_classifier
  top_k: 5
  temperature: 1.2
  floor_probability: 1.0e-6
  embedding_dim: 32
  use_label_supervision: true
  calibration_grid:
    - 0.5
    - 0.75
    - 1.0
    - 1.5
    - 2.0
    - 3.0

triage:
  repeat_ngram_sizes:
    - 2
    - 3
  shuffled_null_trials: 8

hypotheses:
  families:
    - unknown_script
    - monoalphabetic
    - homophonic
    - transposition_heuristic
    - pseudo_text_null

evaluation:
  enabled: true
  ambiguity_levels:
    - 0.0
    - 0.15
    - 0.3
    - 0.45
  top_k: 3
  comparison_strategies:
    - cluster_distance
    - calibrated_classifier
  overdiffuse_entropy_ratio: 0.8
  bootstrap_trials: 500
  bootstrap_confidence_level: 0.95
  bootstrap_seed: 101
