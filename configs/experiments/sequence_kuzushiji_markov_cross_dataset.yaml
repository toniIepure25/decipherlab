experiment:
  name: sequence_kuzushiji_markov_cross_dataset
  seed: 23
  seed_sweep: []
  output_root: outputs/runs
  notes: "Sequence-branch cross-dataset Markov benchmark built from Kuzushiji-49 glyph crops."

dataset:
  source: manifest
  manifest_path: data/raw/kuzushiji49/manifest_balanced_49x300_75_75.yaml
  manifest_format: glyph_crop
  generate_if_missing: false
  train_split: train
  val_split: val
  evaluation_split: test
  min_sequences_per_split_warning: 100
  min_symbol_instances_per_train_class_warning: 50
  min_family_instances_per_split_warning: 0

synthetic:
  families:
    - monoalphabetic
  samples_per_family: 4
  sequence_length: 32
  alphabet_size: 12
  homophonic_extra_symbols: 6
  transposition_block_size: 4
  noise_std: 0.2
  allograph_jitter: 0.7
  image_size: 24
  train_fraction: 0.5
  val_fraction: 0.25

vision:
  feature_downsample: 10
  estimate_clusters: true
  min_clusters: 8
  max_clusters: 64

posterior:
  strategy: calibrated_classifier
  top_k: 6
  temperature: 1.2
  floor_probability: 1.0e-6
  embedding_dim: 32
  use_label_supervision: true
  calibration_grid:
    - 0.5
    - 0.75
    - 1.0
    - 1.5
    - 2.0
    - 3.0

triage:
  repeat_ngram_sizes:
    - 2
    - 3
  shuffled_null_trials: 8

hypotheses:
  families:
    - unknown_script
    - monoalphabetic
    - homophonic
    - transposition_heuristic
    - pseudo_text_null

evaluation:
  enabled: true
  ambiguity_levels:
    - 0.0
    - 0.15
    - 0.30
    - 0.45
  top_k: 5
  comparison_strategies:
    - cluster_distance
    - calibrated_classifier
  overdiffuse_entropy_ratio: 0.8
  bootstrap_trials: 250
  bootstrap_confidence_level: 0.95
  bootstrap_seed: 101

sequence_benchmark:
  enabled: true
  task_name: real_glyph_markov_sequences
  selected_symbol_count: 10
  min_instances_per_symbol: 50
  train_sequences: 192
  val_sequences: 48
  test_sequences: 48
  sequence_length: 12
  group_count: 5
  self_transition_bias: 3.0
  within_group_bias: 1.5
  cross_group_bias: 0.35
  transition_noise: 0.05
  sample_with_replacement: true

structured_uncertainty:
  enabled: true
  representation: confusion_network
  max_candidates_per_position: 6
  cumulative_probability_mass: 0.95
  min_probability: 1.0e-5
  include_top1_fallback: true

decoding:
  enabled: true
  strategy: bigram_beam
  beam_width: 12
  lm_weight: 1.2
  transition_smoothing: 0.1
  top_k_sequences: 5
  length_normalize: true

risk_control:
  enabled: true
  method: split_conformal
  alpha: 0.1
  min_set_size: 1
  max_set_size: 5
  include_top1_fallback: true
