experiment:
  name: sequence_historical_newspapers_real_grouped
  seed: 23
  output_root: outputs/runs
  notes: Real grouped word-sequence benchmark built from Historical Newspapers ALTO OCR token boxes.

dataset:
  source: manifest
  manifest_path: data/processed/historical_newspapers_grouped_words/manifest.yaml
  manifest_format: glyph_crop
  generate_if_missing: false
  train_split: train
  val_split: val
  evaluation_split: test
  min_sequences_per_split_warning: 2
  min_symbol_instances_per_train_class_warning: 2
  min_family_instances_per_split_warning: 1

synthetic:
  families:
    - monoalphabetic
  samples_per_family: 1
  sequence_length: 16
  alphabet_size: 8
  homophonic_extra_symbols: 2
  transposition_block_size: 4
  noise_std: 0.1
  allograph_jitter: 0.5
  image_size: 24
  train_fraction: 0.6
  val_fraction: 0.2

vision:
  feature_downsample: 10
  estimate_clusters: true
  min_clusters: 4
  max_clusters: 12

posterior:
  strategy: calibrated_classifier
  top_k: 4
  temperature: 1.5
  floor_probability: 1.0e-6
  embedding_dim: 32
  use_label_supervision: true
  calibration_grid:
    - 0.5
    - 0.75
    - 1.0
    - 1.5
    - 2.0
    - 3.0
    - 4.0

triage:
  repeat_ngram_sizes:
    - 2
    - 3
  shuffled_null_trials: 8

hypotheses:
  families:
    - unknown_script
    - monoalphabetic
    - homophonic
    - transposition_heuristic
    - pseudo_text_null

evaluation:
  enabled: true
  ambiguity_levels:
    - 0.0
    - 0.15
    - 0.3
    - 0.45
  top_k: 3
  comparison_strategies:
    - cluster_distance
    - calibrated_classifier
  overdiffuse_entropy_ratio: 0.8
  bootstrap_trials: 100
  bootstrap_confidence_level: 0.95
  bootstrap_seed: 23

sequence_benchmark:
  enabled: true
  task_name: real_grouped_manifest_sequences
  selected_symbol_count: 6
  min_instances_per_symbol: 4
  train_sequences: 1
  val_sequences: 1
  test_sequences: 1
  sequence_length: 12
  group_count: 3
  self_transition_bias: 3.0
  within_group_bias: 1.5
  cross_group_bias: 0.35
  transition_noise: 0.05
  sample_with_replacement: false
  process_families:
    - sticky_markov
    - alternating_markov
    - motif_repeat
  motif_length: 3
  motif_noise_probability: 0.1
  minimum_real_sequence_length: 4
  maximum_real_sequence_length: 6

structured_uncertainty:
  enabled: true
  representation: confusion_network
  max_candidates_per_position: 6
  cumulative_probability_mass: 0.95
  min_probability: 1.0e-5
  include_top1_fallback: true

decoding:
  enabled: true
  strategy: bigram_beam
  decoder_variants:
    - bigram_beam
    - trigram_beam
    - crf_viterbi
  beam_width: 8
  lm_weight: 1.0
  trigram_lm_weight: 1.0
  transition_smoothing: 0.1
  top_k_sequences: 5
  length_normalize: true

risk_control:
  enabled: true
  method: split_conformal
  alpha: 0.1
  min_set_size: 1
  max_set_size: 4
  include_top1_fallback: true
